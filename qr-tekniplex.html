<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Tekniplex — Hoja de impresión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f5f4f0;
    color: #1a1917;
    padding: 24px;
  }

  /* ── PANTALLA DE CARGA ── */
  #loading {
    position: fixed; inset: 0;
    background: #1a3a2a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 999;
    color: white;
  }
  #loading p { font-size: 14px; opacity: 0.7; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONTROLES (solo pantalla, no imprime) ── */
  .controls {
    background: #1a3a2a;
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .controls h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .controls span { font-size: 12px; opacity: 0.6; font-family: 'IBM Plex Mono', monospace; }
  .btn-print {
    background: #c8a227; border: none; color: #1a1000;
    padding: 8px 18px; border-radius: 7px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .btn-print:hover { background: #e0b530; }

  /* ── SECCIÓN POR SUBPLANTA ── */
  .seccion {
    margin-bottom: 32px;
    page-break-inside: avoid;
  }
  .seccion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #1a3a2a;
  }
  .seccion-nombre {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #1a3a2a;
  }
  .seccion-count {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: #8a887e;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── GRID DE QR ── */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* ── TARJETA QR ── */
  .qr-card {
    background: white;
    border: 1px solid #d6d4cc;
    border-radius: 10px;
    padding: 16px 12px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .qr-img {
    width: 130px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-img canvas,
  .qr-img img {
    width: 130px !important;
    height: 130px !important;
  }
  .qr-mid {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: #1a3a2a;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .qr-planta {
    font-size: 11px;
    color: #8a887e;
    text-align: center;
  }

  /* ── IMPRESIÓN ── */
  @media print {
    body { background: white; padding: 10px; }
    .controls { display: none !important; }
    #loading { display: none !important; }

    .seccion { page-break-inside: avoid; margin-bottom: 20px; }
    .seccion-header { border-bottom-color: #333; }
    .seccion-nombre { color: #333; }

    .qr-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .qr-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px 8px 8px;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .qr-img { width: 120px; height: 120px; }
    .qr-img canvas, .qr-img img { width: 120px !important; height: 120px !important; }
    .qr-mid { font-size: 13px; }
    .qr-planta { font-size: 10px; }

    @page { margin: 12mm; size: A4 portrait; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Generando códigos QR…</p>
</div>

<div class="controls">
  <div>
    <h1>QR Tekniplex — Hoja de impresión</h1>
    <span id="resumen">Cargando…</span>
  </div>
  <button class="btn-print" onclick="window.print()">🖨 Imprimir / Guardar PDF</button>
</div>

<div id="contenido"></div>

<script>
// ── URL BASE — apunta a GitHub Pages ──────────────────────────
// El QR de cada máquina abrirá: BASE_URL + #CODIGO
// Ejemplo: https://samuel140104.github.io/Tekniplex-vidrios/#YN03
const BASE_URL = 'https://samuel140104.github.io/Tekniplex-vidrios/';

// ── SUBPLANTAS ────────────────────────────────────────────────
const SUBPLANTAS = [
  { nombre: 'Inyección',         maquinas: ['YN03','YN05','YN06','YN09','YN11','YN12','YN13','YN15','YN16','YN17','YN18'] },
  { nombre: 'Laminación-Barrera',maquinas: ['LA01','LA04','LA09','LA12','LA14','LA15','CO01'] },
  { nombre: 'Encartonado',       maquinas: ['WE07','WE08','WE09','WE10','WE12','WE13','WE14'] },
  { nombre: 'Mangas',            maquinas: ['MA01','MA05','MA06','MA09','MA12'] },
  { nombre: 'OMV',               maquinas: ['OMV50','OMV87','OMV51','OMV77','OMV82','OMV78','OMV79','OMV84','OMV83','OMV52','OMV86','OMV88','OMV75','OMV40','OM80','OM85','OM70'] },
  { nombre: 'Industrial',        maquinas: ['TI32','TI28','TI08','TI35','TI25','TI18','TI11','TI03','TI07','TI02','TI36','TE22','TE08','TE07','TE02','TE32','TE06','TE29'] },
  { nombre: 'Impresión',         maquinas: ['IM18','IM01','IM05','IM06','IM17','IM22'] },
  { nombre: 'Papel 1 y 3',       maquinas: ['VI02','UF11','UF14','UF16','UF05','UF35','UF32','UF10','UF27','UF28','UF29','UF30','UF34','UF37','UF38','UF31','UF12','VR01','VR02','VR04','VR07'] },
  { nombre: 'Película',          maquinas: ['HF05','HF03','HF04','HF07','HF10','HF06'] },
  { nombre: 'Etiqueta',          maquinas: ['ET04','ET05','ET06','ET07','ET09','ET02'] },
  { nombre: 'Foil',              maquinas: ['FRL05','FRL06','FRL01','FRL04','FRL09','FRL10','FRL17','FRL13','FRL03','FRL02'] },
  { nombre: 'Maquilas',          maquinas: ['ULMA','EM08'] },
];

// ── GENERADOR ─────────────────────────────────────────────────
function generarQRs() {
  const contenido = document.getElementById('contenido');
  const totalMaquinas = SUBPLANTAS.reduce((a, s) => a + s.maquinas.length, 0);

  document.getElementById('resumen').textContent =
    `${SUBPLANTAS.length} subplantas · ${totalMaquinas} máquinas`;

  SUBPLANTAS.forEach(subplanta => {
    // Contenedor de sección
    const seccion = document.createElement('div');
    seccion.className = 'seccion';

    // Encabezado de sección
    seccion.innerHTML = `
      <div class="seccion-header">
        <span class="seccion-nombre">${subplanta.nombre}</span>
        <span class="seccion-count">${subplanta.maquinas.length} máquina${subplanta.maquinas.length !== 1 ? 's' : ''}</span>
      </div>
    `;

    // Grid de tarjetas
    const grid = document.createElement('div');
    grid.className = 'qr-grid';

    subplanta.maquinas.forEach(mid => {
      const url = BASE_URL + '#' + mid;

      const card = document.createElement('div');
      card.className = 'qr-card';

      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr-img';
      qrDiv.id = 'qr-' + mid;

      card.innerHTML = `
        <div class="qr-img" id="qr-${mid}"></div>
        <div class="qr-mid">${mid}</div>
        <div class="qr-planta">${subplanta.nombre}</div>
      `;

      grid.appendChild(card);
    });

    seccion.appendChild(grid);
    contenido.appendChild(seccion);

    // Generar QRs después de insertar en el DOM
    subplanta.maquinas.forEach(mid => {
      const url = BASE_URL + '#' + mid;
      new QRCode(document.getElementById('qr-' + mid), {
        text: url,
        width: 130,
        height: 130,
        colorDark: '#1a3a2a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    });
  });

  // Ocultar pantalla de carga
  document.getElementById('loading').style.display = 'none';
}

// Esperar a que QRCode esté listo
window.addEventListener('load', () => {
  setTimeout(generarQRs, 200);
});
</script>
</body>
</html>
