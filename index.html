<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekniplex — Categorización de Vidrios y Material Quebradizo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#eeede8;
  --border:#d6d4cc;--border2:#c2c0b6;
  --text:#1a1917;--text2:#5a5852;--text3:#8a887e;
  --accent:#1a3a2a;--accent2:#2d6147;--accent-light:#e8f2ec;
  --danger:#8b2020;--danger-light:#fdf0f0;
  --z1:#8b2020;--z1bg:#fdf0f0;
  --z2:#b84000;--z2bg:#fff3ec;
  --z3:#7a4a00;--z3bg:#fef8ec;
  --z4:#1a6b38;--z4bg:#e8f2ec;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-header h1{font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:14px;}
.hcount{font-size:11px;opacity:.5;font-family:var(--mono);}
.mode-badge{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:10px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;transition:background .15s;}
.mode-badge:hover{background:rgba(255,255,255,.22);}
.mode-badge.edit{background:#c8a227;border-color:#a07a10;color:#1a1000;}
.main{display:flex;height:calc(100vh - 53px);overflow:hidden;}
.sidebar{width:215px;min-width:215px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.slabel{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:8px 16px 5px;}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .12s;}
.sitem:hover{background:var(--surface2);color:var(--text);}
.sitem.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:500;}
.sbadge{font-family:var(--mono);font-size:10px;background:var(--surface2);color:var(--text3);padding:2px 6px;border-radius:10px;}
.sitem.active .sbadge{background:var(--accent-light);color:var(--accent2);}
.sdiv{height:1px;background:var(--border);margin:10px 0;}
.sadd{font-size:12px;color:var(--text3);padding:8px 16px;cursor:pointer;}
.sadd:hover{color:var(--accent);background:var(--surface2);}
.content{flex:1;overflow-y:auto;}
.content-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;}
.content-header h2{font-size:17px;font-weight:500;}
.content-header p{font-size:12px;color:var(--text3);margin-top:3px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--sans);transition:all .1s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-p:hover{background:var(--accent2);}
.btn-d{background:var(--danger-light);color:var(--danger);border-color:#e0b0b0;}
.btn-sm{padding:5px 9px;font-size:11px;}
/* zones */
.zpill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.z1{background:var(--z1bg);color:var(--z1);border:1px solid #e8b0b0;}
.z2{background:var(--z2bg);color:var(--z2);border:1px solid #f0c090;}
.z3{background:var(--z3bg);color:var(--z3);border:1px solid #e0c070;}
.z4{background:var(--z4bg);color:var(--z4);border:1px solid #a8cdb8;}
.znone{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
/* grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px;padding:18px 22px;}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow .15s;}
.mcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}
.mcard-h{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
.mid{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);}
.mcard-b{padding:11px 14px;}
.mname{font-size:13px;font-weight:500;margin-bottom:8px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono);}
.chip.z1{background:var(--z1bg);color:var(--z1);border:1px solid #e8b0b0;}
.chip.z2{background:var(--z2bg);color:var(--z2);border:1px solid #f0c090;}
.chip.z3{background:var(--z3bg);color:var(--z3);border:1px solid #e0c070;}
.chip.z4{background:var(--z4bg);color:var(--z4);border:1px solid #a8cdb8;}
.chip.znone{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.cmeta{font-size:11px;color:var(--text3);}
.cact{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:7px;}
/* modal */
.mov{display:none;position:fixed;inset:0;background:rgba(15,15,15,.45);z-index:300;align-items:center;justify-content:center;padding:20px;}
.mov.open{display:flex;}
.modal{background:var(--surface);border-radius:10px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.mhdr{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10;}
.mhdr h3{font-size:15px;font-weight:500;}
.mbdy{padding:20px;}
.mftr{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);}
.xbtn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1;padding:0;}
.xbtn:hover{color:var(--text);}
/* form */
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.07em;}
.fi,.fs,.fta{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:6px;font-size:13px;font-family:var(--sans);background:var(--surface);color:var(--text);transition:border-color .1s;}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--accent);}
.fta{min-height:68px;resize:vertical;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* radio list */
.rlist{display:flex;flex-direction:column;gap:5px;}
.ritem{display:flex;align-items:center;gap:10px;padding:7px 11px;border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .1s;}
.ritem:hover{border-color:var(--border2);background:var(--surface2);}
.ritem.sel-z1{border-color:var(--z1);background:var(--z1bg);}
.ritem.sel-z2{border-color:var(--z2);background:var(--z2bg);}
.ritem.sel-z3{border-color:var(--z3);background:var(--z3bg);}
.ritem.sel-z4{border-color:var(--z4);background:var(--z4bg);}
.ritem.sel-e{border-color:var(--accent);background:var(--accent-light);}
.rdot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.rdot.on{border-color:var(--accent);background:var(--accent);}
.rdot.on::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff;}
.rcode{font-family:var(--mono);font-size:11px;font-weight:600;margin-right:6px;}
.rdesc{font-size:13px;color:var(--text2);}
/* mat items */
.msh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mst{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);}
.matitem{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:14px;margin-bottom:10px;}
.maith{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mainum{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text3);}
.maidel{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:0;line-height:1;}
.maidel:hover{color:var(--danger);}
.sdiv2{height:1px;background:var(--border);margin:16px 0;}
/* inspecciones — ahora novedades por máquina */
.ilist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.iitem{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;}
.idate{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600;min-width:90px;margin-top:1px;}
.itext{font-size:12px;color:var(--text2);flex:1;line-height:1.5;}
.idel{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0;line-height:1;}
.idel:hover{color:var(--danger);}
.iadd{display:flex;flex-direction:column;gap:8px;background:var(--surface2);border:1px dashed var(--border2);border-radius:7px;padding:12px;margin-top:8px;}
/* detail */
.dgrid{padding:18px 22px;}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-width:760px;}
.dchdr{padding:16px 20px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:space-between;}
.dchdr .did{font-family:var(--mono);font-size:20px;font-weight:500;}
.dchdr .dname{font-size:13px;opacity:.75;margin-top:2px;}
.dsec{padding:16px 20px;border-bottom:1px solid var(--border);}
.dsec:last-child{border-bottom:none;}
.dsect{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.drow:last-child{border-bottom:none;}
.dkey{color:var(--text3);font-size:12px;min-width:130px;}
.dval{text-align:right;color:var(--text);max-width:60%;}
.dval.mono{font-family:var(--mono);font-size:12px;}
.mtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}
.mtable th{text-align:left;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;border-bottom:2px solid var(--border);}
.mtable td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text2);}
.mtable tr:last-child td{border-bottom:none;}
.mtable td:first-child{color:var(--text);font-weight:500;}
.ihist{display:flex;flex-direction:column;gap:0;}
.ihrow{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.ihrow:last-child{border-bottom:none;}
.ihdate{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600;min-width:90px;}
.ihtxt{font-size:13px;color:var(--text2);flex:1;line-height:1.5;}
/* ── PANEL DE INSPECCIONES GLOBAL ── */
.insp-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.6);z-index:500;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.insp-overlay.open{display:flex;}
.insp-panel{background:var(--bg);border-radius:12px;width:100%;max-width:1050px;margin:auto;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;}
.insp-hdr{background:#0f4c91;color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;}
.insp-hdr h2{font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.insp-body{padding:22px;display:flex;flex-direction:column;gap:18px;}
.insp-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;}
.insp-tab{padding:9px 18px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text3);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);}
.insp-tab.active{color:#0f4c91;border-bottom-color:#0f4c91;}
.insp-tab-content{display:none;}.insp-tab-content.active{display:block;}
.cron-table{width:100%;border-collapse:collapse;font-size:12px;}
.cron-table th{text-align:left;padding:7px 10px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);background:var(--surface);}
.cron-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
.cron-table tr:hover td{background:var(--surface2);}
.cron-mes td{background:var(--surface2)!important;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:10px 10px;}
.cron-hoy td{background:#e8f2ec!important;}
.cron-pasada{opacity:.45;}
.zpill-z1{background:#fdf0f0;color:#8b2020;display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.zpill-z2{background:#fef8ec;color:#b84000;display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.zpill-z3{background:#fff8e8;color:#7a4a00;display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.zpill-z4{background:#e8f2ec;color:#1a6b38;display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.insp-reg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
.insp-reg-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;}
.insp-reg-fecha{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.insp-reg-body{font-size:12px;color:var(--text2);line-height:1.6;}
.insp-reg-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0;flex-shrink:0;}
.insp-reg-del:hover{color:var(--danger);}
.est-pill{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;}
.est-realizada{background:#e8f2ec;color:#1a6b38;}
.est-parcial{background:#fef8ec;color:#7a4a00;}
.est-pendiente{background:#fdf0f0;color:#8b2020;}
/* misc */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty .ico{font-size:36px;margin-bottom:10px;}
.empty p{font-size:13px;margin-top:6px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.pwscreen{display:none;position:fixed;inset:0;background:var(--accent);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.pwscreen.open{display:flex;}
.pwscreen h2{color:#fff;font-size:16px;font-weight:400;opacity:.85;}
.pwscreen input{padding:10px 16px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;font-family:var(--mono);letter-spacing:.15em;text-align:center;width:200px;outline:none;}
.pwscreen input::placeholder{opacity:.4;letter-spacing:.05em;}
.pwerr{color:#f5a0a0;font-size:12px;min-height:16px;}
.foto-zona{margin-top:8px;}
.foto-preview{width:100%;max-height:180px;object-fit:cover;border-radius:7px;border:1px solid var(--border);display:block;cursor:pointer;}
.foto-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.foto-input-lbl{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px dashed var(--border2);border-radius:6px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;}
.foto-input-lbl:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.foto-input-lbl input{display:none;}
.foto-uploading{font-size:11px;color:var(--text3);font-family:var(--mono);padding:4px 0;}
.foto-galeria{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.foto-item{position:relative;}
.foto-del{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:18px;text-align:center;cursor:pointer;padding:0;}
/* Modal de foto grande */
.foto-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center;padding:20px;}
.foto-modal.open{display:flex;}
.foto-modal img{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;}
.foto-modal-close{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;line-height:1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(max-width:600px){.sidebar{width:145px;min-width:145px;}.mgrid{grid-template-columns:1fr;padding:12px;}.frow{grid-template-columns:1fr;}}
/* ── BOTONES HEADER ── */
.btn-excel{background:#1d6f42;color:#fff;border-color:#155230;}
.btn-excel:hover{background:#155230;}
.btn-dash{background:#0f4c91;color:#fff;border-color:#0a3568;}
.btn-dash:hover{background:#0a3568;}
/* ── DASHBOARD OVERLAY ── */
.dash-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.6);z-index:500;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.dash-overlay.open{display:flex;}
.dash-panel{background:var(--bg);border-radius:12px;width:100%;max-width:1100px;margin:auto;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;}
.dash-hdr{background:var(--accent);color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;}
.dash-hdr h2{font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.dash-body{padding:22px;display:flex;flex-direction:column;gap:22px;}
.dash-row{display:grid;gap:14px;}
.dash-row-2{grid-template-columns:1fr 1fr;}
.dash-row-3{grid-template-columns:1fr 1fr 1fr;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.dash-card h3{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;text-align:center;}
.kpi-val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1;}
.kpi-lbl{font-size:11px;color:var(--text3);margin-top:5px;}
.kpi.red .kpi-val{color:var(--z1);}
.kpi.orange .kpi-val{color:var(--z2);}
.kpi.yellow .kpi-val{color:var(--z3);}
.kpi.green .kpi-val{color:var(--z4);}
/* bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.bar-lbl{min-width:140px;color:var(--text2);text-align:right;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:18px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;display:flex;align-items:center;padding-left:6px;}
.bar-fill span{font-size:10px;font-family:var(--mono);font-weight:600;color:#fff;white-space:nowrap;}
/* donut */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
/* table inside dash */
.dash-table{width:100%;border-collapse:collapse;font-size:12px;}

<script>

  {id:'papel',      nombre:'Papel 1 y 3',        maquinas:['VI02','UF11','UF14','UF16','UF05','UF35','UF32','UF10','UF27','UF28','UF29','UF30','UF34','UF37','UF38','UF31','UF12','VR01','VR02','VR04','VR07']},
  {id:'pelicula',   nombre:'Película',           maquinas:['HF05','HF03','HF04','HF07','HF10','HF06']},

let S = {sp:[],fichas:{},areas:{},fichasAreas:{},inspecciones:[],planta:null,maquina:null,area:null,espacio:null,edit:false,editing:null,modo:'sp'};
let eMats=[], eInsps=[];

async function save(){
  try{
    await DB.ref('subplantas').set(S.sp);
    await DB.ref('fichas').set(S.fichas);
    await DB.ref('areas').set(S.areas);
    await DB.ref('fichasAreas').set(S.fichasAreas);
    await DB.ref('inspecciones').set(S.inspecciones);
    localStorage.setItem('tkx_sp5',JSON.stringify(S.sp));
    localStorage.setItem('tkx_fc5',JSON.stringify(S.fichas));
  }catch(e){
    console.error('Firebase save error:',e);
    try{localStorage.setItem('tkx_sp5',JSON.stringify(S.sp));localStorage.setItem('tkx_fc5',JSON.stringify(S.fichas));}catch(e2){}
    toast('⚠ Sin conexión — guardado solo localmente');
  }
}

// ── FOTOS ─────────────────────────────────────────────────────
async function subirFoto(file, path){
  const ref = ST.ref(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}

function abrirFotoModal(url){
  document.getElementById('foto-modal-img').src=url;
  document.getElementById('foto-modal').classList.add('open');
}
function closeFotoModal(){
  document.getElementById('foto-modal').classList.remove('open');
  document.getElementById('foto-modal-img').src='';
}

async function handleFotoMat(idx){
  const input=document.getElementById('foto-file-'+idx);
  if(!input||!input.files[0]) return;
  const file=input.files[0];
  const lbl=document.getElementById('foto-lbl-'+idx);
  if(lbl) lbl.textContent='Subiendo…';
  try{
    const mid=S.editing||'general';
    const path='fotos/'+mid+'/mat_'+idx+'_'+Date.now();
    const url=await subirFoto(file,path);
    if(!eMats[idx].fotos) eMats[idx].fotos=[];
    eMats[idx].fotos.push(url);
    renderMList();
    toast('✅ Foto guardada');
  }catch(e){
    if(lbl) lbl.textContent='📷 Agregar foto';
    toast('❌ Error al subir foto: '+e.message);
  }
}

// Borra todas las fotos de Storage de un material (cuando se elimina el material completo)
async function borrarFotosMaterial(mat){
  const fotos = mat.fotos||[];
  for(const url of fotos){
    if(url && url.includes('firebasestorage')){
      try{
        const ref = ST.refFromURL(url);
        await ref.delete();
      }catch(e){
        console.warn('No se pudo borrar foto de Storage:', e.message);
      }
    }
  }
}

async function delFotoMat(matIdx, fotoIdx){
  if(!eMats[matIdx].fotos) return;
  const url = eMats[matIdx].fotos[fotoIdx];
  // Borrar el archivo físico de Firebase Storage
  if(url && url.includes('firebasestorage')){
    try{
      const ref = ST.refFromURL(url);
      await ref.delete();
    }catch(e){
      // Si ya no existe en Storage, ignorar el error y continuar
      console.warn('No se pudo borrar de Storage (puede que ya no exista):', e.message);
    }
  }
  eMats[matIdx].fotos.splice(fotoIdx,1);
  renderMList();
  toast('🗑 Foto eliminada del almacenamiento');
}

async function load(){
  try{
    const spSnap = await DB.ref('subplantas').get();
    const fcSnap = await DB.ref('fichas').get();
    S.sp     = spSnap.exists() ? spSnap.val() : JSON.parse(JSON.stringify(SP_DEF));
    S.fichas = fcSnap.exists() ? fcSnap.val() : {};
    const arSnap = await DB.ref('areas').get();
    const faSnap = await DB.ref('fichasAreas').get();
    const inSnap = await DB.ref('inspecciones').get();
    S.areas       = arSnap.exists() ? arSnap.val() : JSON.parse(JSON.stringify(AREAS_DEF));
    S.fichasAreas = faSnap.exists() ? faSnap.val() : {};
    S.inspecciones= inSnap.exists() ? inSnap.val() : [];
    localStorage.setItem('tkx_sp5',JSON.stringify(S.sp));
    localStorage.setItem('tkx_fc5',JSON.stringify(S.fichas));
  }catch(e){
    console.warn('Firebase load failed, using local cache:',e);
    try{
      const sp=localStorage.getItem('tkx_sp5');
      const fc=localStorage.getItem('tkx_fc5');
      S.sp     = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(SP_DEF));
      S.fichas = fc ? JSON.parse(fc) : {};
      S.inspecciones=[];
    }catch(e2){S.sp=JSON.parse(JSON.stringify(SP_DEF));S.fichas={};S.inspecciones=[];}
  }
}

function worstZ(mats){
  if(!mats||!mats.length) return 'none';
  return mats.reduce((w,m)=>(ZORD[m.zona]||0)>(ZORD[w]||0)?m.zona:w,'none');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ── AUTH ──────────────────────────────────────────────────────
function toggleEdit(){
  if(S.edit){S.edit=false;render();}
  else{
    document.getElementById('pwi').value='';
    document.getElementById('pwe').textContent='';
    document.getElementById('pws').classList.add('open');
    setTimeout(()=>document.getElementById('pwi').focus(),100);
  }
}
function chkPw(){
  if(document.getElementById('pwi').value===PW){
    S.edit=true;
    document.getElementById('pws').classList.remove('open');
    render();toast('Modo edición activado');
  }else{
    document.getElementById('pwe').textContent='Contraseña incorrecta';
    document.getElementById('pwi').value='';
  }
}
function closePw(){document.getElementById('pws').classList.remove('open');}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  renderSidebar(); renderContent();
  const tot=S.sp.reduce((a,s)=>a+s.maquinas.length,0);
  document.getElementById('hcount').textContent=S.sp.length+' subplantas · '+tot+' máquinas';
  const b=document.getElementById('mbadge');
  b.textContent=S.edit?'✏ Modo edición':'Solo lectura';
  b.className='mode-badge'+(S.edit?' edit':'');
}

function renderSidebar(){
  // ── SECCIÓN SUBPLANTAS ──
  let h='<div class="slabel">Subplantas de planta</div>';
  S.sp.forEach(p=>{
    h+='<div class="sitem'+(S.modo==='sp'&&S.planta===p.id?' active':'')+'" onclick="selP(\''+p.id+'\')">'+
       '<span>'+esc(p.nombre)+'</span><span class="sbadge">'+p.maquinas.length+'</span></div>';
  });
  if(S.edit) h+='<div class="sdiv"></div><div class="sadd" onclick="showAddSP()">+ Nueva subplanta</div>';

  // ── SEPARADOR ──
  h+='<div class="sdiv" style="margin:14px 0"></div>';

  // ── SECCIÓN ÁREAS ──
  h+='<div class="slabel">Áreas de planta</div>';
  Object.entries(S.areas).forEach(([aid,area])=>{
    const count=area.espacios?area.espacios.length:0;
    h+='<div class="sitem'+(S.modo==='area'&&S.area===aid?' active':'')+'" onclick="selArea(\''+aid+'\')">'+
       '<span>'+esc(area.nombre)+'</span><span class="sbadge">'+count+'</span></div>';
  });
  if(S.edit) h+='<div class="sdiv"></div><div class="sadd" onclick="showAddArea()">+ Nueva área</div>';

  document.getElementById('sidebar').innerHTML=h;
}

function selP(id){S.planta=id;S.maquina=null;S.modo='sp';S.area=null;S.espacio=null;render();}

function selArea(id){
  S.area=id; S.espacio=null; S.modo='area';
  S.planta=null; S.maquina=null;
  render();
}

function renderAreaContent(){
  if(S.espacio){renderEspacioDetail();return;}
  if(!S.area){return;}
  const area=S.areas[S.area];
  const espacios=area.espacios||[];
  const tipo=area.tipo||'espacio';
  document.getElementById('stitle').textContent=area.nombre;
  document.getElementById('ssub').textContent=espacios.length+' '+tipo+(espacios.length!==1?'s':'')+' registrados';
  document.getElementById('hact').innerHTML=S.edit
    ?'<button class="btn btn-sm btn-p" onclick="showAddEspacio()">+ Agregar '+tipo+'</button>'
    :'';
  let grid='';
  espacios.forEach(eid=>{
    const f=S.fichasAreas[eid]||{};
    const mats=f.materiales||[];
    const wz=worstZ(mats);
    let chips='';
    if(mats.length){
      mats.slice(0,4).forEach(m=>{chips+='<span class="chip '+(m.zona||'znone')+'">'+esc(m.elemento||'—')+'</span>';});
      if(mats.length>4) chips+='<span class="chip znone">+'+(mats.length-4)+'</span>';
    } else {chips='<span style="font-size:11px;color:var(--text3)">Sin materiales</span>';}
    const btn=S.edit
      ?'<button class="btn btn-sm" onclick="editEspacio(\''+eid+'\')">✏ Editar</button><button class="btn btn-sm btn-d" onclick="confDelEspacio(\''+eid+'\')">Eliminar</button>'
      :'<button class="btn btn-sm btn-p" onclick="verEspacioD(\''+eid+'\')">Ver ficha completa</button>';
    const displayName=(eid.split('__').pop()||eid).replace(/_/g,' ');
    grid+='<div class="mcard">'+
      '<div class="mcard-h"><span class="mid">'+esc(displayName)+'</span><span class="zpill '+wz+'">'+esc(ZLABEL[wz])+'</span></div>'+
      '<div class="mcard-b">'+(f.nombre?'<div class="mname">'+esc(f.nombre)+'</div>':'')+
      '<div class="chips">'+chips+'</div>'+
      '<div class="cmeta">'+mats.length+' material'+(mats.length!==1?'es':'')+' · Resp: '+esc(f.responsable||'—')+'</div></div>'+
      '<div class="cact">'+btn+'</div></div>';
  });
  document.getElementById('mc').innerHTML='<div class="mgrid">'+(grid||'<div class="empty"><p>No hay '+tipo+'s aún. Usa "+ Agregar '+tipo+'" para comenzar.</p></div>')+'</div>';
}
  
function renderContent(){
  if(S.modo==='area'){renderAreaContent();return;}
  if(S.maquina){renderDetail();return;}
  if(!S.planta){
    document.getElementById('stitle').textContent='Selecciona una subplanta o área';
    document.getElementById('ssub').textContent='Usa el menú lateral para navegar';
    document.getElementById('hact').innerHTML='';
    document.getElementById('mc').innerHTML='<div class="empty"><div class="ico">🏭</div><p>Selecciona una subplanta o área para ver las fichas.</p></div>';
    return;
  }
  const p=S.sp.find(x=>x.id===S.planta);
  document.getElementById('stitle').textContent=p.nombre;
  document.getElementById('ssub').textContent=p.maquinas.length+' máquinas registradas';
  document.getElementById('hact').innerHTML=S.edit
    ?'<button class="btn btn-sm btn-p" onclick="showAddM()">+ Máquina</button><button class="btn btn-sm btn-d" onclick="confDelP(\''+p.id+'\')">Eliminar subplanta</button>'
    :'';
  let grid='';
  p.maquinas.forEach(mid=>{
    const f=S.fichas[mid]||{};
    const mats=f.materiales||[];
    const wz=worstZ(mats);
    let chips='';
    if(mats.length){
      mats.slice(0,4).forEach(m=>{chips+='<span class="chip '+(m.zona||'znone')+'">'+esc(m.elemento||'—')+'</span>';});
      if(mats.length>4) chips+='<span class="chip znone">+'+(mats.length-4)+'</span>';
    } else {chips='<span style="font-size:11px;color:var(--text3)">Sin materiales</span>';}
    const btn=S.edit
      ?'<button class="btn btn-sm" onclick="editM(\''+mid+'\')">✏ Editar</button><button class="btn btn-sm btn-d" onclick="confDelM(\''+mid+'\')">Eliminar</button>'
      :'<button class="btn btn-sm btn-p" onclick="verD(\''+mid+'\')">Ver ficha completa</button>';
    grid+='<div class="mcard">'+
      '<div class="mcard-h"><span class="mid">'+esc(mid)+'</span><span class="zpill '+wz+'">'+esc(ZLABEL[wz])+'</span></div>'+
      '<div class="mcard-b"><div class="mname">'+esc(f.nombre||'Sin nombre registrado')+'</div>'+
      '<div class="chips">'+chips+'</div>'+
      '<div class="cmeta">'+mats.length+' material'+(mats.length!==1?'es':'')+' · Resp: '+esc(f.responsable||'—')+'</div></div>'+
      '<div class="cact">'+btn+'</div></div>';
  });
  document.getElementById('mc').innerHTML='<div class="mgrid">'+grid+'</div>';
}

// ── DETAIL ────────────────────────────────────────────────────
function verD(mid){S.maquina=mid;render();}

function renderDetail(){
  const mid=S.maquina;
  const f=S.fichas[mid]||{};
  const mats=f.materiales||[];
  const insps=f.inspecciones||[];
  const p=S.sp.find(x=>x.maquinas.includes(mid));
  const wz=worstZ(mats);
  document.getElementById('stitle').textContent=mid;
  document.getElementById('ssub').textContent=p?p.nombre:'';
  document.getElementById('hact').innerHTML='<button class="btn btn-sm" onclick="S.maquina=null;render()">← Volver</button>';

  let trows='';
  if(mats.length){
    mats.forEach((m,i)=>{
      trows+='<tr><td style="color:var(--text3);font-family:var(--mono)">'+(i+1)+'</td>'+

function selElem(i,eid){
  eMats[i].elemento=eid;
  // update only element radio list inside mat item
  const mat=document.getElementById('mat'+i);
  if(!mat) return;
  mat.querySelectorAll('.rlist')[0].querySelectorAll('.ritem').forEach((el,j)=>{
    const s=ELEMS[j].id===eid;
    el.className='ritem'+(s?' sel-e':'');
    el.querySelector('.rdot').className='rdot'+(s?' on':'');
  });
}
function selZona(i,zid){
  eMats[i].zona=zid;
  const mat=document.getElementById('mat'+i);
  if(!mat) return;
  mat.querySelectorAll('.rlist')[1].querySelectorAll('.ritem').forEach((el,j)=>{
    const s=ZONAS[j].id===zid;
    el.className='ritem'+(s?' sel-'+zid:'');
    el.querySelector('.rdot').className='rdot'+(s?' on':'');
  });
}
function addMat(){
  eMats.push({elemento:'',tipo:'',ubicacion:'',cantidad:'',zona:'',obs:''});
  renderMList();
  setTimeout(()=>{
    const items=document.querySelectorAll('.matitem');
    if(items.length) items[items.length-1].scrollIntoView({behavior:'smooth',block:'center'});
  },60);
}
async function delMat(i){
  // Borrar fotos del material de Firebase Storage antes de eliminarlo
  if(eMats[i] && (eMats[i].fotos||[]).length>0){
    await borrarFotosMaterial(eMats[i]);
  }
  eMats.splice(i,1);
  renderMList();
  toast('Material eliminado');
}

function saveFicha(){
  // capture text inputs
  eMats.forEach((m,i)=>{
    const t=document.getElementById('mt'+i);const u=document.getElementById('mu'+i);
    const c=document.getElementById('mc'+i);const o=document.getElementById('mo'+i);
    if(t)m.tipo=t.value;if(u)m.ubicacion=u.value;if(c)m.cantidad=c.value;if(o)m.obs=o.value;
  });
  const mid=S.editing;
  S.fichas[mid]={
    nombre:       document.getElementById('fn').value,
    responsable:  document.getElementById('fr').value,
    fecha:        document.getElementById('ff').value,
    proxima:      document.getElementById('fp').value,
    observaciones:document.getElementById('fo').value,
    materiales:   JSON.parse(JSON.stringify(eMats)),
    inspecciones: JSON.parse(JSON.stringify(eInsps)),
    updated:      today(),
  };
  save();closeMod();render();
  toast('Ficha de '+mid+' guardada — '+eMats.length+' materiales, '+eInsps.length+' inspecciones');
}

    '<button class="btn btn-p" onclick="saveEspacio()">Guardar todo</button>';
  document.getElementById('mov').classList.add('open');
  renderIList();renderMList();
}

function saveEspacio(){
  const key=S.editing.replace('area__','');
  eMats.forEach((m,i)=>{
    const t=document.getElementById('mt'+i);const u=document.getElementById('mu'+i);
    const c=document.getElementById('mc'+i);const o=document.getElementById('mo'+i);
    if(t)m.tipo=t.value;if(u)m.ubicacion=u.value;if(c)m.cantidad=c.value;if(o)m.obs=o.value;
  });
  S.fichasAreas[key]={
    nombre:       document.getElementById('fn').value,
    responsable:  document.getElementById('fr').value,
    fecha:        document.getElementById('ff').value,
    proxima:      document.getElementById('fp').value,
    observaciones:document.getElementById('fo').value,
    materiales:   JSON.parse(JSON.stringify(eMats)),
    inspecciones: JSON.parse(JSON.stringify(eInsps)),
    updated:      today(),
  };
  save();closeMod();render();
  toast('Ficha guardada — '+eMats.length+' materiales');
}

// ── ELIMINAR ESPACIO ──────────────────────────────────────────
function confDelEspacio(eid){
  const nombre=eid.split('__')[1]||eid;
  document.getElementById('mtitle').textContent='Eliminar espacio';
  document.getElementById('mbdy').innerHTML='<p style="font-size:13px;line-height:1.6">¿Eliminar <strong>'+esc(nombre.replace(/_/g,' '))+'</strong> y todos sus datos?</p>';
  document.getElementById('mftr').innerHTML=
    '<button class="btn" onclick="closeMod()">Cancelar</button>'+
    '<button class="btn btn-d" onclick="delEspacio(\''+eid+'\')">Sí, eliminar</button>';
  document.getElementById('mov').classList.add('open');
}
function delEspacio(eid){
  const area=S.areas[S.area];
  area.espacios=area.espacios.filter(e=>e!==eid);
  delete S.fichasAreas[eid];
  save();closeMod();render();
  toast('Espacio eliminado');
}

  
// ── DELETE ────────────────────────────────────────────────────
function confDelM(mid){
  document.getElementById('mtitle').textContent='Eliminar máquina';
  document.getElementById('mbdy').innerHTML='<p style="font-size:13px;line-height:1.6">¿Eliminar <strong>'+esc(mid)+'</strong> y todos sus datos?</p>';
  document.getElementById('mftr').innerHTML=
    '<button class="btn" onclick="closeMod()">Cancelar</button>'+
    '<button class="btn btn-d" onclick="delM(\''+mid+'\')">Sí, eliminar</button>';
  document.getElementById('mov').classList.add('open');
}
function delM(mid){
  const p=S.sp.find(x=>x.id===S.planta);
  p.maquinas=p.maquinas.filter(m=>m!==mid);
  delete S.fichas[mid];save();closeMod();render();toast('Máquina '+mid+' eliminada');
}
function confDelP(id){
  const p=S.sp.find(x=>x.id===id);
  document.getElementById('mtitle').textContent='Eliminar subplanta';
  document.getElementById('mbdy').innerHTML='<p style="font-size:13px;line-height:1.6">¿Eliminar <strong>'+esc(p.nombre)+'</strong> con sus '+p.maquinas.length+' máquinas?</p>';
  document.getElementById('mftr').innerHTML=
    '<button class="btn" onclick="closeMod()">Cancelar</button>'+
    '<button class="btn btn-d" onclick="delP(\''+id+'\')">Sí, eliminar</button>';
  document.getElementById('mov').classList.add('open');
}
function delP(id){
  const p=S.sp.find(x=>x.id===id);
  p.maquinas.forEach(m=>delete S.fichas[m]);
  S.sp=S.sp.filter(x=>x.id!==id);S.planta=null;
  save();closeMod();render();toast('Subplanta eliminada');
}

// ── MODAL ─────────────────────────────────────────────────────
function closeMod(){
  document.getElementById('mov').classList.remove('open');
  S.editing=null;eMats=[];eInsps=[];
}
document.getElementById('mov').addEventListener('click',function(e){if(e.target===this)closeMod();});

// ── HASH ROUTING — QR support ─────────────────────────────────
function routeFromHash(){
  const hash = window.location.hash.replace('#','').trim().toUpperCase();
  if(!hash) { render(); return; }
  const planta = S.sp.find(p => p.maquinas.map(m=>m.toUpperCase()).includes(hash));
  if(planta){
    const realMid = planta.maquinas.find(m=>m.toUpperCase()===hash);
    S.planta  = planta.id;
    S.maquina = realMid;
  }
  render();
}

function zonaClass(z){
  if(z==='Zona 1') return 'zpill-z1';
  if(z==='Zona 2') return 'zpill-z2';

// PANEL DE INSPECCIONES — funciones
// ════════════════════════════════════════════════════════════
function openInsp(){
  document.getElementById('insp-overlay').classList.add('open');
  inspTab('cronograma');
}
function closeInsp(){
  document.getElementById('insp-overlay').classList.remove('open');
}
document.getElementById('insp-overlay').addEventListener('click',function(e){if(e.target===this)closeInsp();});

function inspTab(tab){
  document.querySelectorAll('.insp-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.insp-tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('insp-tab-'+tab).classList.add('active');
  if(tab==='cronograma') renderCronograma();
  if(tab==='registrar') renderFormInsp();
  if(tab==='historial') renderHistorialInsp();
}

function renderCronograma(){
  const hoy = today();
  let html = '<div style="overflow-x:auto"><table class="cron-table"><thead><tr>'+
    '<th>Fecha</th><th>Día</th><th>Zona</th><th>Grupo</th><th>Subplantas</th><th>Frecuencia</th></tr></thead><tbody>';
  let mesActual = '';
  CRONOGRAMA_FY27.forEach(r=>{
    if(r.mes!==mesActual){
      mesActual=r.mes;
      html+=`<tr class="cron-mes"><td colspan="6">${esc(r.mes)}</td></tr>`;
    }
    const pasada = r.fecha < hoy;
    const esHoy  = r.fecha === hoy;
    const cls = esHoy ? 'cron-hoy' : (pasada ? 'cron-pasada' : '');
    const fechaDisplay = r.fecha.split('-').reverse().join('/');
    html+=`<tr class="${cls}">
      <td style="font-family:var(--mono);font-size:12px;white-space:nowrap">${fechaDisplay}</td>
      <td style="font-size:11px;color:var(--text3)">${esc(r.dia)}</td>
      <td><span class="${zonaClass(r.zona)}">${esc(r.zona)}</span></td>
      <td style="font-size:12px">${esc(r.grupo)}</td>
      <td style="font-size:11px;color:var(--text2);max-width:300px">${esc(r.subplantas)}</td>
      <td style="font-size:11px;color:var(--text3);white-space:nowrap">${esc(r.frec)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('insp-tab-cronograma').innerHTML=html;
}

async function guardarInsp(){
  const fecha=document.getElementById('insp-fecha').value;
  const resp=document.getElementById('insp-resp').value.trim();
  if(!fecha||!resp){toast('⚠ Completa fecha y responsable');return;}
  const insp={
    id: Date.now(),
    fecha,
    responsable: resp,
    zona:        document.getElementById('insp-zona').value,
    grupo:       document.getElementById('insp-grupo').value,
    estado:      document.getElementById('insp-estado').value,
    subplantas:  document.getElementById('insp-subplantas').value.trim(),
    hallazgos:   document.getElementById('insp-hallazgos').value.trim(),
    acciones:    document.getElementById('insp-acciones').value.trim(),
    observaciones:document.getElementById('insp-obs').value.trim(),
    registrado:  today(),
  };
  if(!Array.isArray(S.inspecciones)) S.inspecciones=[];
  S.inspecciones.unshift(insp);
  await save();
  toast('✅ Inspección guardada');
  inspTab('historial');
  document.querySelectorAll('.insp-tab')[2].click();
}

function renderHistorialInsp(){
  const insps = S.inspecciones||[];
  if(!insps.length){
    document.getElementById('insp-tab-historial').innerHTML=
      '<p style="color:var(--text3);font-size:13px;text-align:center;padding:40px">No hay inspecciones registradas aún.</p>';
    return;
  }
  const estClass={Realizada:'est-realizada',Parcial:'est-parcial',Pendiente:'est-pendiente'};
  let html='';
  insps.forEach((ins,idx)=>{
    const fechaD=(ins.fecha||'').split('-').reverse().join('/');
    html+=`<div class="insp-reg-card">
      <div class="insp-reg-hdr">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="insp-reg-fecha">${fechaD}</span>
          <span class="${estClass[ins.estado]||'est-realizada'} est-pill">${esc(ins.estado||'Realizada')}</span>
          ${ins.zona?`<span class="${zonaClass(ins.zona.split(' —')[0])}">${esc(ins.zona)}</span>`:''}
          ${ins.grupo?`<span style="font-size:11px;color:var(--text3)">${esc(ins.grupo)}</span>`:''}
        </div>
        ${S.edit?`<button class="insp-reg-del" onclick="delInspGlobal(${idx})" title="Eliminar">🗑</button>`:''}
      </div>
      <div class="insp-reg-body">
        <div style="margin-bottom:4px"><strong>Inspector:</strong> ${esc(ins.responsable||'—')}</div>
        ${ins.subplantas?`<div style="margin-bottom:4px"><strong>Subplantas/Áreas:</strong> ${esc(ins.subplantas)}</div>`:''}
        ${ins.hallazgos?`<div style="margin-bottom:4px"><strong>Hallazgos:</strong> ${esc(ins.hallazgos)}</div>`:''}
        ${ins.acciones?`<div style="margin-bottom:4px"><strong>Acciones:</strong> ${esc(ins.acciones)}</div>`:''}
        ${ins.observaciones?`<div><strong>Observaciones:</strong> ${esc(ins.observaciones)}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('insp-tab-historial').innerHTML=html;
}

async function delInspGlobal(idx){
  if(!confirm('¿Eliminar esta inspección?')) return;
  S.inspecciones.splice(idx,1);
  await save();
  renderHistorialInsp();
  toast('Inspección eliminada');
}

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// EXPORTAR A EXCEL
// ════════════════════════════════════════════════════════════
function exportExcel(){
  if(!window.XLSX){ toast('Cargando librería Excel…'); return; }
  const wb = XLSX.utils.book_new();
  const zlbl = {z1:'Zona 1 — Crítico alto',z2:'Zona 2 — Crítico',z3:'Zona 3 — No crítico',z4:'Zona 4 — Bajo riesgo',none:'Sin zonificar'};
  const elbl = {};
  ELEMS.forEach(e=>elbl[e.id]=e.desc);

  // ── HOJA 1: RESUMEN GENERAL ──────────────────────────────
  const resumen = [
    ['TEKNIPLEX — RESUMEN GENERAL DE MATERIALES QUEBRADIZOS'],
    ['Fecha de exportación:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Subplanta','Total Máquinas','Máquinas con Datos','Total Materiales','Zona 1 (Crítico alto)','Zona 2 (Crítico)','Zona 3 (No crítico)','Zona 4 (Bajo riesgo)','Sin zonificar','% Completitud']
  ];
  S.sp.forEach(p=>{
    const conDatos = p.maquinas.filter(m=>S.fichas[m]&&(S.fichas[m].materiales||[]).length>0).length;
    const mats = p.maquinas.flatMap(m=>(S.fichas[m]||{}).materiales||[]);
    resumen.push([
      p.nombre,
      p.maquinas.length,
      conDatos,
      mats.length,
      mats.filter(m=>m.zona==='z1').length,
      mats.filter(m=>m.zona==='z2').length,
      mats.filter(m=>m.zona==='z3').length,
      mats.filter(m=>m.zona==='z4').length,
      mats.filter(m=>!m.zona||m.zona==='none').length,
      p.maquinas.length>0 ? Math.round(conDatos/p.maquinas.length*100)+'%' : '0%'
    ]);
  });
  // Totales
  const allMats = Object.values(S.fichas).flatMap(f=>f.materiales||[]);
  const totalMaq = S.sp.reduce((a,p)=>a+p.maquinas.length,0);
  const conDatosTot = S.sp.reduce((a,p)=>a+p.maquinas.filter(m=>S.fichas[m]&&(S.fichas[m].materiales||[]).length>0).length,0);
  resumen.push([]);
  resumen.push(['TOTAL',totalMaq,conDatosTot,allMats.length,
    allMats.filter(m=>m.zona==='z1').length,allMats.filter(m=>m.zona==='z2').length,
    allMats.filter(m=>m.zona==='z3').length,allMats.filter(m=>m.zona==='z4').length,
    allMats.filter(m=>!m.zona||m.zona==='none').length,
    totalMaq>0?Math.round(conDatosTot/totalMaq*100)+'%':'0%'
  ]);
  const wsRes = XLSX.utils.aoa_to_sheet(resumen);
  wsRes['!cols']=[{wch:22},{wch:16},{wch:18},{wch:16},{wch:20},{wch:16},{wch:18},{wch:18},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsRes, 'Resumen General');

  // ── HOJA 2: TODOS LOS MATERIALES ─────────────────────────
  const matRows = [
    ['TEKNIPLEX — DETALLE DE TODOS LOS MATERIALES QUEBRADIZOS'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Subplanta','Código Máquina','Nombre Máquina','Responsable','Última Revisión','Próxima Inspección','#','Elemento (Código)','Elemento (Descripción)','Descripción Material','Ubicación en Máquina','Cantidad','Zona','Observación / Plan de acción','Fecha Actualización','Fotos']
  ];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const mats=f.materiales||[];
      if(mats.length===0){
        matRows.push([p.nombre,mid,f.nombre||'',f.responsable||'',f.fecha||'',f.proxima||'',0,'','','','','','','Sin materiales registrados',f.updated||'','']);
      } else {
        mats.forEach((m,i)=>{
          const fotos=(m.fotos||[]);
          const fotosCell=fotos.length ? fotos.join(' | ') : '';
          matRows.push([
            p.nombre, mid, f.nombre||'', f.responsable||'', f.fecha||'', f.proxima||'',
            i+1, m.elemento||'', elbl[m.elemento]||'', m.tipo||'', m.ubicacion||'',
            m.cantidad||'', zlbl[m.zona]||'Sin zonificar', m.obs||'', f.updated||'', fotosCell
          ]);
        });
      }
    });
  });
  const wsMat = XLSX.utils.aoa_to_sheet(matRows);
  wsMat['!cols']=[{wch:18},{wch:12},{wch:22},{wch:16},{wch:14},{wch:16},{wch:5},{wch:12},{wch:28},{wch:24},{wch:22},{wch:10},{wch:22},{wch:30},{wch:14},{wch:40}];
  // Convertir URLs de fotos en hipervínculos clickeables
  matRows.forEach((row,ri)=>{
    if(ri<4) return; // saltar encabezados
    const fotosVal=row[15];
    if(fotosVal && fotosVal.includes('http')){
      const urls=fotosVal.split(' | ');
      const cellAddr=XLSX.utils.encode_cell({r:ri,c:15});
      if(urls.length===1){
        wsMat[cellAddr]={t:'s',v:'Ver foto',l:{Target:urls[0],Tooltip:'Abrir foto'}};
      } else {
        // múltiples fotos: poner links numerados en la misma celda como texto con todos los urls
        wsMat[cellAddr]={t:'s',v:urls.map((u,i)=>'Foto '+(i+1)+': '+u).join('\n')};
      }
    }
  });
  XLSX.utils.book_append_sheet(wb, wsMat, 'Todos los Materiales');

  // ── HOJA 3 (NUEVA): REQUIEREN REVISIÓN ───────────────────
  const revRows = [
    ['TEKNIPLEX — MATERIALES QUE REQUIEREN REVISIÓN / ACCIÓN'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    ['* Incluye todos los materiales que tienen observación registrada'],
    [],
    ['Subplanta','Código Máquina','Nombre Máquina','Responsable','Última Revisión','Próxima Inspección','#','Elemento (Código)','Elemento (Descripción)','Descripción Material','Ubicación en Máquina','Cantidad','Zona','Observación / Plan de acción','Fecha Actualización','Fotos']
  ];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const mats=f.materiales||[];
      mats.forEach((m,i)=>{
        // Solo incluir si tiene observación
        if(!m.obs || !m.obs.trim()) return;
        const fotos=(m.fotos||[]);
        const fotosCell=fotos.length ? fotos.join(' | ') : '';
        revRows.push([
          p.nombre, mid, f.nombre||'', f.responsable||'', f.fecha||'', f.proxima||'',
          i+1, m.elemento||'', elbl[m.elemento]||'', m.tipo||'', m.ubicacion||'',
          m.cantidad||'', zlbl[m.zona]||'Sin zonificar', m.obs||'', f.updated||'', fotosCell
        ]);
      });
    });
  });
  // También incluir áreas de planta
  Object.entries(S.areas||{}).forEach(([aid,area])=>{
    (area.espacios||[]).forEach(eid=>{
      const f=S.fichasAreas[eid]||{};
      const mats=f.materiales||[];
      const nombreEsp=f.nombreEspacio||(eid.includes('__')?eid.split('__')[1].replace(/_/g,' '):eid);
      mats.forEach((m,i)=>{
        if(!m.obs || !m.obs.trim()) return;
        const fotos=(m.fotos||[]);
        const fotosCell=fotos.length ? fotos.join(' | ') : '';
        revRows.push([
          area.nombre+' (Área)', eid, nombreEsp, f.responsable||'', f.fecha||'', f.proxima||'',
          i+1, m.elemento||'', elbl[m.elemento]||'', m.tipo||'', m.ubicacion||'',
          m.cantidad||'', zlbl[m.zona]||'Sin zonificar', m.obs||'', f.updated||'', fotosCell
        ]);
      });
    });
  });
  const wsRev = XLSX.utils.aoa_to_sheet(revRows);
  wsRev['!cols']=[{wch:18},{wch:12},{wch:22},{wch:16},{wch:14},{wch:16},{wch:5},{wch:12},{wch:28},{wch:24},{wch:22},{wch:10},{wch:22},{wch:30},{wch:14},{wch:40}];
  // Links de fotos en hoja de revisión
  revRows.forEach((row,ri)=>{
    if(ri<5) return;
    const fotosVal=row[15];
    if(fotosVal && fotosVal.includes('http')){
      const urls=fotosVal.split(' | ');
      const cellAddr=XLSX.utils.encode_cell({r:ri,c:15});
      if(urls.length===1){
        wsRev[cellAddr]={t:'s',v:'Ver foto',l:{Target:urls[0],Tooltip:'Abrir foto'}};
      } else {
        wsRev[cellAddr]={t:'s',v:urls.map((u,i)=>'Foto '+(i+1)+': '+u).join('\n')};
      }
    }
  });
  const totalConObs=revRows.length-5;
  XLSX.utils.book_append_sheet(wb, wsRev, 'Requieren Revisión');

  // ── HOJA 3: INSPECCIONES ─────────────────────────────────
  const inspRows = [
    ['TEKNIPLEX — HISTORIAL DE INSPECCIONES'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Subplanta','Código Máquina','Nombre Máquina','Responsable','Fecha Inspección','Observación registrada']
  ];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const insps=f.inspecciones||[];
      // Solo incluir si tiene inspecciones reales
      if(insps.length>0){
        [...insps].reverse().forEach(ins=>{
          inspRows.push([p.nombre,mid,f.nombre||'',f.responsable||'',ins.fecha||'',ins.texto||'']);
        });
      }
    });
  });
  const wsInsp = XLSX.utils.aoa_to_sheet(inspRows);
  wsInsp['!cols']=[{wch:18},{wch:12},{wch:22},{wch:16},{wch:14},{wch:60}];
  XLSX.utils.book_append_sheet(wb, wsInsp, 'Novedades por Máquina');

  // ── HOJA 4: MÁQUINAS SIN DATOS ───────────────────────────
  const sinDatos = [
    ['TEKNIPLEX — MÁQUINAS PENDIENTES DE REGISTRO'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Subplanta','Código Máquina','Estado']
  ];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const mats=f.materiales||[];
      if(mats.length===0){
        sinDatos.push([p.nombre, mid, 'Sin materiales registrados']);
      }
    });
  });
  const wsSin = XLSX.utils.aoa_to_sheet(sinDatos);
  wsSin['!cols']=[{wch:20},{wch:14},{wch:28}];
  XLSX.utils.book_append_sheet(wb, wsSin, 'Pendientes de Registro');

  // ── HOJA 5: POR SUBPLANTA (una por cada una) ──────────────
  S.sp.forEach(p=>{
    const rows=[
      ['SUBPLANTA: '+p.nombre.toUpperCase()],
      ['Fecha:', new Date().toLocaleDateString('es-CO')],
      ['Total máquinas:', p.maquinas.length],
      [],
      ['Código','Nombre','Responsable','Última Revisión','Próxima Inspección','Total Materiales','Zona Más Crítica','Inspecciones','Última Actualización']
    ];
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const mats=f.materiales||[];
      const insps=f.inspecciones||[];
      const worst=mats.length?mats.reduce((w,m)=>(ZORD[m.zona]||0)>(ZORD[w]||0)?m.zona:w,'none'):'none';
      rows.push([
        mid, f.nombre||'', f.responsable||'', f.fecha||'', f.proxima||'',
        mats.length, zlbl[worst], insps.length, f.updated||''
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:12},{wch:22},{wch:16},{wch:14},{wch:16},{wch:14},{wch:22},{wch:12},{wch:14}];
    const sheetName = p.nombre.substring(0,28).replace(/[:\\/?*\[\]]/g,'');
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  // ── HOJA: RESUMEN ÁREAS DE PLANTA ────────────────────────
  const areaResumen = [
    ['TEKNIPLEX — RESUMEN DE ÁREAS DE PLANTA (Talleres, Laboratorios, Pasillos, Oficinas)'],
    ['Fecha de exportación:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Área','Tipo','Espacio / Ubicación','Responsable','Última Revisión','Próxima Inspección','Total Materiales','Zona 1','Zona 2','Zona 3','Zona 4','Sin zonificar','Inspecciones registradas']
  ];
  Object.entries(S.areas||{}).forEach(([aid, area])=>{
    const espacios = area.espacios||[];
    if(espacios.length===0){
      areaResumen.push([area.nombre||aid, area.tipo||'', '(sin espacios registrados)','','','',0,0,0,0,0,0,0]);
    } else {
      espacios.forEach(eid=>{
        const f = S.fichasAreas[eid]||{};
        const mats = f.materiales||[];
        const insps = f.inspecciones||[];
        const nombre = (eid.split('__')[1]||eid).replace(/_/g,' ');
        areaResumen.push([
          area.nombre||aid,
          area.tipo||'',
          nombre,
          f.responsable||'',
          f.fecha||'',
          f.proxima||'',
          mats.length,
          mats.filter(m=>m.zona==='z1').length,
          mats.filter(m=>m.zona==='z2').length,
          mats.filter(m=>m.zona==='z3').length,
          mats.filter(m=>m.zona==='z4').length,
          mats.filter(m=>!m.zona||m.zona==='none').length,
          insps.length
        ]);
      });
    }
  });
  const wsAreaRes = XLSX.utils.aoa_to_sheet(areaResumen);
  wsAreaRes['!cols']=[{wch:20},{wch:14},{wch:24},{wch:18},{wch:14},{wch:16},{wch:14},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsAreaRes, 'Resumen Áreas');

  // ── HOJA: MATERIALES DE ÁREAS ─────────────────────────────
  const areaMatRows = [
    ['TEKNIPLEX — MATERIALES QUEBRADIZOS EN ÁREAS DE PLANTA'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Área','Tipo de área','Espacio / Ubicación','Responsable','Última Revisión','Próxima Inspección','#','Elemento (Código)','Elemento (Descripción)','Descripción Material','Ubicación en Espacio','Cantidad','Zona','Observación / Plan de acción','Fecha Actualización','Fotos']
  ];
  Object.entries(S.areas||{}).forEach(([aid, area])=>{
    (area.espacios||[]).forEach(eid=>{
      const f = S.fichasAreas[eid]||{};
      const mats = f.materiales||[];
      const nombre = f.nombreEspacio||(eid.includes('__')?(eid.split('__')[1]||eid).replace(/_/g,' '):eid.replace(/_/g,' '));
      if(mats.length===0){
        areaMatRows.push([area.nombre||aid, area.tipo||'', nombre, f.responsable||'', f.fecha||'', f.proxima||'', 0,'','','','','','','Sin materiales registrados', f.updated||'','']);
      } else {
        mats.forEach((m,i)=>{
          const fotos=(m.fotos||[]);
          const fotosCell=fotos.length ? fotos.join(' | ') : '';
          areaMatRows.push([
            area.nombre||aid, area.tipo||'', nombre,
            f.responsable||'', f.fecha||'', f.proxima||'',
            i+1, m.elemento||'', elbl[m.elemento]||'', m.tipo||'', m.ubicacion||'',
            m.cantidad||'', zlbl[m.zona]||'Sin zonificar', m.obs||'', f.updated||'', fotosCell
          ]);
        });
      }
    });
  });
  const wsAreaMat = XLSX.utils.aoa_to_sheet(areaMatRows);
  wsAreaMat['!cols']=[{wch:18},{wch:14},{wch:24},{wch:16},{wch:14},{wch:16},{wch:5},{wch:12},{wch:28},{wch:24},{wch:22},{wch:10},{wch:22},{wch:30},{wch:14},{wch:40}];
  // Links de fotos en materiales de áreas
  areaMatRows.forEach((row,ri)=>{
    if(ri<4) return;
    const fotosVal=row[15];
    if(fotosVal && fotosVal.includes('http')){
      const urls=fotosVal.split(' | ');
      const cellAddr=XLSX.utils.encode_cell({r:ri,c:15});
      if(urls.length===1){
        wsAreaMat[cellAddr]={t:'s',v:'Ver foto',l:{Target:urls[0],Tooltip:'Abrir foto'}};
      } else {
        wsAreaMat[cellAddr]={t:'s',v:urls.map((u,i)=>'Foto '+(i+1)+': '+u).join('\n')};
      }
    }
  });
  XLSX.utils.book_append_sheet(wb, wsAreaMat, 'Materiales Áreas');

  // ── HOJA: INSPECCIONES DE ÁREAS ───────────────────────────
  const areaInspRows = [
    ['TEKNIPLEX — HISTORIAL DE INSPECCIONES EN ÁREAS DE PLANTA'],
    ['Fecha:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Área','Tipo de área','Espacio / Ubicación','Responsable','Fecha Inspección','Observación registrada']
  ];
  Object.entries(S.areas||{}).forEach(([aid, area])=>{
    (area.espacios||[]).forEach(eid=>{
      const f = S.fichasAreas[eid]||{};
      const insps = f.inspecciones||[];
      const nombre = f.nombreEspacio||(eid.includes('__')?(eid.split('__')[1]||eid).replace(/_/g,' '):eid.replace(/_/g,' '));
      // Solo incluir si tiene inspecciones reales
      if(insps.length>0){
        [...insps].reverse().forEach(ins=>{
          areaInspRows.push([area.nombre||aid, area.tipo||'', nombre, f.responsable||'', ins.fecha||'', ins.texto||'']);
        });
      }
    });
  });
  const wsAreaInsp = XLSX.utils.aoa_to_sheet(areaInspRows);
  wsAreaInsp['!cols']=[{wch:18},{wch:14},{wch:24},{wch:16},{wch:14},{wch:60}];
  XLSX.utils.book_append_sheet(wb, wsAreaInsp, 'Inspecciones Áreas');

  // ── HOJA: INSPECCIONES REALIZADAS ────────────────────────
  const inspGRows=[
    ['TEKNIPLEX — INSPECCIONES REALIZADAS FY27'],
    ['Fecha exportación:', new Date().toLocaleDateString('es-CO')],
    [],
    ['Fecha','Inspector / Responsable','Zona','Grupo','Subplantas / Áreas','Estado','Hallazgos','Acciones tomadas','Observaciones','Fecha de registro']
  ];
  (S.inspecciones||[]).forEach(ins=>{
    inspGRows.push([
      ins.fecha||'', ins.responsable||'', ins.zona||'', ins.grupo||'',
      ins.subplantas||'', ins.estado||'Realizada',
      ins.hallazgos||'', ins.acciones||'', ins.observaciones||'',
      ins.registrado||''
    ]);
  });
  const wsInspG=XLSX.utils.aoa_to_sheet(inspGRows);
  wsInspG['!cols']=[{wch:12},{wch:22},{wch:22},{wch:10},{wch:40},{wch:12},{wch:50},{wch:40},{wch:40},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsInspG, 'Inspecciones Realizadas');

  // ── HOJA: CRONOGRAMA FY27 ─────────────────────────────────
  const cronRows=[
    ['TEKNIPLEX — CRONOGRAMA DE INSPECCIONES FY27 (Julio 2026 — Abril 2027)'],
    [],
    ['Mes','Fecha','Día semana','Zona','Grupo','Subplantas involucradas','Frecuencia']
  ];
  CRONOGRAMA_FY27.forEach(r=>{
    const fechaD=r.fecha.split('-').reverse().join('/');
    cronRows.push([r.mes, fechaD, r.dia, r.zona, r.grupo, r.subplantas, r.frec]);
  });
  const wsCron=XLSX.utils.aoa_to_sheet(cronRows);
  wsCron['!cols']=[{wch:16},{wch:12},{wch:10},{wch:22},{wch:10},{wch:60},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsCron, 'Cronograma FY27');

  // ── DESCARGAR ─────────────────────────────────────────────
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'Tekniplex_Vidrios_'+fecha+'.xlsx');
  toast('✅ Excel exportado con '+(wb.SheetNames.length)+' hojas · '+totalConObs+' materiales requieren revisión');
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
function openDash(){
  document.getElementById('dash-overlay').classList.add('open');
  renderDash();
}
function closeDash(){
  document.getElementById('dash-overlay').classList.remove('open');
}

function renderDash(){
  const zlbl2={z1:'Zona 1 — Crítico alto',z2:'Zona 2 — Crítico',z3:'Zona 3 — No crítico',z4:'Zona 4 — Bajo riesgo',none:'Sin zonificar'};
  const zcolor={z1:'#8b2020',z2:'#b84000',z3:'#7a4a00',z4:'#1a6b38',none:'#8a887e'};
  const allMats = Object.values(S.fichas).flatMap(f=>f.materiales||[]);
  const allInsps = Object.values(S.fichas).flatMap(f=>f.inspecciones||[]);
  const totalMaq = S.sp.reduce((a,p)=>a+p.maquinas.length,0);
  const conDatos = S.sp.reduce((a,p)=>a+p.maquinas.filter(m=>S.fichas[m]&&(S.fichas[m].materiales||[]).length>0).length,0);
  const sinDatos = totalMaq - conDatos;

  // conteo por zona
  const porZona={z1:0,z2:0,z3:0,z4:0,none:0};
  allMats.forEach(m=>{ const z=m.zona||'none'; porZona[z]=(porZona[z]||0)+1; });

  // conteo por elemento
  const porElem={};
  allMats.forEach(m=>{ if(m.elemento){ porElem[m.elemento]=(porElem[m.elemento]||0)+1; } });
  const topElems = Object.entries(porElem).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxElem = topElems.length?topElems[0][1]:1;

  // por subplanta
  const porSP = S.sp.map(p=>{
    const mats=p.maquinas.flatMap(m=>(S.fichas[m]||{}).materiales||[]);
    return {nombre:p.nombre, total:mats.length, z1:mats.filter(m=>m.zona==='z1').length};
  }).sort((a,b)=>b.total-a.total).slice(0,8);
  const maxSP = porSP.length?porSP[0].total:1;

  // máquinas más críticas (zona 1)
  const criticas=[];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      const z1count=(f.materiales||[]).filter(m=>m.zona==='z1').length;
      if(z1count>0) criticas.push({mid,nombre:f.nombre||'',sp:p.nombre,z1count,total:(f.materiales||[]).length});
    });
  });
  criticas.sort((a,b)=>b.z1count-a.z1count);
  const top10=criticas.slice(0,10);

  // próximas inspecciones vencidas o por vencer
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const proximas=[];
  S.sp.forEach(p=>{
    p.maquinas.forEach(mid=>{
      const f=S.fichas[mid]||{};
      if(f.proxima){
        const d=new Date(f.proxima+'T00:00:00');
        const dias=Math.round((d-hoy)/(1000*60*60*24));
        proximas.push({mid,nombre:f.nombre||'',sp:p.nombre,fecha:f.proxima,dias});
      }
    });
  });
  proximas.sort((a,b)=>a.dias-b.dias);
  const urgentes=proximas.slice(0,8);

  // ── KPIs ─────────────────────────────────────────────────
  const kpis=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-val">${totalMaq}</div><div class="kpi-lbl">Total Máquinas</div></div>
    <div class="kpi green"><div class="kpi-val">${conDatos}</div><div class="kpi-lbl">Con datos registrados</div></div>
    <div class="kpi red"><div class="kpi-val">${sinDatos}</div><div class="kpi-lbl">Sin datos aún</div></div>
    <div class="kpi"><div class="kpi-val">${allMats.length}</div><div class="kpi-lbl">Total materiales</div></div>
    <div class="kpi red"><div class="kpi-val">${porZona.z1}</div><div class="kpi-lbl">Zona 1 — Crítico alto</div></div>
    <div class="kpi orange"><div class="kpi-val">${porZona.z2}</div><div class="kpi-lbl">Zona 2 — Crítico</div></div>
    <div class="kpi yellow"><div class="kpi-val">${porZona.z3}</div><div class="kpi-lbl">Zona 3 — No crítico</div></div>
    <div class="kpi green"><div class="kpi-val">${porZona.z4}</div><div class="kpi-lbl">Zona 4 — Bajo riesgo</div></div>
  </div>`;

  // ── DONUT ZONAS (SVG) ─────────────────────────────────────
  const total=allMats.length||1;
  const zones=[
    {id:'z1',v:porZona.z1,c:'#8b2020',lbl:'Zona 1 — Crítico alto'},
    {id:'z2',v:porZona.z2,c:'#b84000',lbl:'Zona 2 — Crítico'},
    {id:'z3',v:porZona.z3,c:'#c8a227',lbl:'Zona 3 — No crítico'},
    {id:'z4',v:porZona.z4,c:'#1a6b38',lbl:'Zona 4 — Bajo riesgo'},
    {id:'none',v:porZona.none,c:'#c2c0b6',lbl:'Sin zonificar'},
  ];
  let offset=0, paths='';
  const r=70,cx=90,cy=90,stroke=28;
  const circum=2*Math.PI*r;
  zones.forEach(z=>{
    const pct=z.v/total;
    const dash=pct*circum;
    const gap=circum-dash;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${z.c}" stroke-width="${stroke}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(-offset*circum/total).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=z.v;
  });
  const donutSvg=`<svg width="180" height="180" viewBox="0 0 180 180">${paths}
    <text x="90" y="86" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1917" font-family="IBM Plex Mono,monospace">${allMats.length}</text>
    <text x="90" y="100" text-anchor="middle" font-size="10" fill="#8a887e" font-family="IBM Plex Sans,sans-serif">materiales</text>
  </svg>`;
  const legend=zones.map(z=>`<div class="legend-item"><div class="legend-dot" style="background:${z.c}"></div><span>${z.lbl}: <strong>${z.v}</strong> (${allMats.length?Math.round(z.v/allMats.length*100):0}%)</span></div>`).join('');

  // ── BARRAS POR SUBPLANTA ──────────────────────────────────
  const barsSP=porSP.map(s=>{
    const pct=maxSP?Math.round(s.total/maxSP*100):0;
    const pctZ1=s.total?Math.round(s.z1/s.total*100):0;
    return `<div class="bar-row">
      <span class="bar-lbl">${esc(s.nombre)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.z1>0?'#8b2020':'#1a3a2a'}">
        <span>${s.total} mat${s.total!==1?'s':''} ${s.z1>0?'· '+s.z1+' Z1':''}</span>
      </div></div>
    </div>`;
  }).join('');

  // ── BARRAS POR ELEMENTO ───────────────────────────────────
  const elblMap={};
  ELEMS.forEach(e=>elblMap[e.id]=e.desc);
  const barsElem=topElems.map(([eid,cnt])=>{
    const pct=maxElem?Math.round(cnt/maxElem*100):0;
    return `<div class="bar-row">
      <span class="bar-lbl" title="${elblMap[eid]||eid}">${eid} — ${(elblMap[eid]||'').substring(0,20)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#0f4c91">
        <span>${cnt}</span>
      </div></div>
    </div>`;
  }).join('');

  // ── TABLA MÁQUINAS CRÍTICAS ───────────────────────────────
  const tabCriticas=top10.length
    ?`<table class="dash-table"><thead><tr><th>Máquina</th><th>Nombre</th><th>Subplanta</th><th>Zona 1</th><th>Total Mats</th></tr></thead><tbody>${
      top10.map(c=>`<tr><td>${esc(c.mid)}</td><td>${esc(c.nombre)}</td><td>${esc(c.sp)}</td>
        <td><span style="background:#fdf0f0;color:#8b2020;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${c.z1count}</span></td>
        <td>${c.total}</td></tr>`).join('')
    }</tbody></table>`
    :'<p style="color:var(--text3);font-size:13px">No hay máquinas con materiales de Zona 1 registrados.</p>';

  // ── TABLA PRÓXIMAS INSPECCIONES ───────────────────────────
  const tabProx=urgentes.length
    ?`<table class="dash-table"><thead><tr><th>Máquina</th><th>Nombre</th><th>Subplanta</th><th>Fecha</th><th>Estado</th></tr></thead><tbody>${
      urgentes.map(x=>{
        const color=x.dias<0?'#8b2020':x.dias<=7?'#b84000':x.dias<=30?'#7a4a00':'#1a6b38';
        const label=x.dias<0?`Vencida hace ${Math.abs(x.dias)}d`:x.dias===0?'Hoy':x.dias<=7?`En ${x.dias} días`:x.dias<=30?`En ${x.dias} días`:`En ${x.dias} días`;
        return `<tr><td>${esc(x.mid)}</td><td>${esc(x.nombre)}</td><td>${esc(x.sp)}</td>
          <td style="font-family:monospace">${x.fecha}</td>
          <td><span style="background:${color}22;color:${color};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${label}</span></td></tr>`;
      }).join('')
    }</tbody></table>`
    :'<p style="color:var(--text3);font-size:13px">No hay fechas de próxima inspección registradas.</p>';

  // ── RENDER FINAL ──────────────────────────────────────────
  document.getElementById('dash-body').innerHTML=`
    <div class="dash-card"><h3>Indicadores clave</h3>${kpis}</div>

    <div class="dash-row dash-row-2">
      <div class="dash-card"><h3>Distribución por zona de riesgo</h3>
        <div class="donut-wrap">${donutSvg}<div class="donut-legend">${legend}</div></div>
      </div>
      <div class="dash-card"><h3>Materiales por subplanta</h3>
        <div class="bar-chart">${barsSP||'<p style="color:var(--text3);font-size:13px">Sin datos</p>'}</div>
      </div>
    </div>

    <div class="dash-row dash-row-2">
      <div class="dash-card"><h3>Tipos de elemento más frecuentes</h3>
        <div class="bar-chart">${barsElem||'<p style="color:var(--text3);font-size:13px">Sin datos</p>'}</div>
      </div>
      <div class="dash-card"><h3>Máquinas con mayor riesgo (Zona 1)</h3>${tabCriticas}</div>
    </div>

    <div class="dash-card"><h3>Próximas inspecciones — más urgentes</h3>${tabProx}</div>

    <div style="text-align:right;padding:4px 0">
      <button class="btn btn-excel" onclick="exportExcel()" style="background:#1d6f42;color:#fff;border-color:#155230">📥 Exportar todo a Excel</button>
    </div>
  `;
}

document.getElementById('dash-overlay').addEventListener('click',function(e){if(e.target===this)closeDash();});
</script>
